<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenGemini 2.5F-unlimited</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0ede8;
      --surface:   #e8e4de;
      --card:      #faf8f5;
      --border:    #d4cfc8;
      --accent:    #1a6b4a;
      --text:      #1c1a17;
      --muted:     #8a8278;
      --user-bg:   #1a6b4a;
      --user-text: #f0ede8;
      --bot-bg:    #faf8f5;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(26,107,74,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(232,98,42,0.05) 0%, transparent 50%);
    }

    .wrapper {
      width: 100%;
      max-width: 680px;
      height: 92vh;
      max-height: 860px;
      display: flex;
      flex-direction: column;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
    }

    header {
      background: var(--text);
      color: var(--bg);
      padding: 1rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-shrink: 0;
    }

    .logo {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 0.7rem;
      opacity: 0.5;
      margin-top: 1px;
      font-family: 'JetBrains Mono', monospace;
    }

    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 5px;
      font-size: 0.68rem;
      opacity: 0.7;
      font-family: 'JetBrains Mono', monospace;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #apiSetup {
      background: #fffbf7;
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.2rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #apiSetup label {
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #apiKey {
      flex: 1;
      min-width: 150px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 0.8rem;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #apiKey:focus { border-color: var(--accent); }

    #saveBtn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.45rem 0.9rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    #saveBtn:hover { opacity: 0.85; }

    #systemArea {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.55rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    #systemArea label {
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #systemPrompt {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      outline: none;
      resize: none;
      height: 24px;
      line-height: 1.5;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      background: var(--bg);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      color: var(--muted);
      text-align: center;
      padding: 2rem;
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .empty strong {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--text);
      display: block;
    }
    .empty span { font-size: 0.8rem; line-height: 1.6; }

    .msg {
      display: flex;
      gap: 0.6rem;
      animation: fadeUp 0.2s ease;
      max-width: 88%;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .msg.bot  .avatar { background: var(--accent); }
    .msg.user .avatar { background: var(--text); }

    .bubble {
      padding: 0.7rem 0.95rem;
      border-radius: 14px;
      font-size: 0.84rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.bot  .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .bubble img, .bubble video {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin-top: 0.5rem;
    }

    .file-badge {
      display: inline-block;
      background: #e8f5e9;
      color: #1b5e20;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 0.3rem;
    }

    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      margin-right: 3px;
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1.1); }
    }

    #inputBar {
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 0.85rem 1.2rem;
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #userInput {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0.65rem 1rem;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      outline: none;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #userInput:focus { border-color: var(--accent); }
    #userInput::placeholder { color: var(--muted); }

    #fileBtn, #sendBtn {
      width: 44px; height: 44px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }
    #fileBtn:hover, #sendBtn:hover { background: #155c3e; }
    #fileBtn:active, #sendBtn:active { transform: scale(0.94); }
    #fileBtn:disabled, #sendBtn:disabled { background: var(--border); cursor: not-allowed; }
    #fileBtn svg, #sendBtn svg { width: 18px; height: 18px; }

    #fileInput {
      display: none;
    }

    .hint {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      padding: 0.3rem;
      background: var(--card);
      font-family: 'JetBrains Mono', monospace;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .saved-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #dcfce7; color: #166534;
      border-radius: 6px; padding: 2px 8px;
      font-size: 0.68rem; font-family: 'JetBrains Mono', monospace;
      animation: fadeUp 0.2s ease;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo">✦∞</div>
    <div>
      <h1>OpenGemini✦∞ Project by xcore</h1>
      <p>opengemini-2.5-flash · limitsiz</p>
    </div>
    <div class="status-dot"><div class="dot"></div> aktif</div>
  </header>

  <div id="apiSetup">
    <label>API</label>
    <input type="password" id="apiKey" placeholder="Gemini API key" autocomplete="off" />
    <button id="saveBtn" onclick="saveKey()">Kaydet</button>
  </div>

  <div id="systemArea">
    <label>OpenGemini Tarzı</label>
    <div id="systemPromptDisplay" style="flex: 1; background: transparent; border: none; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 0.78rem; line-height: 1.5; user-select: none; padding: 0;">Samimi, üretken yapay zeka modeli. Resim çizmek için "çiz: açıklama" yazınız.</div>
    <textarea id="systemPrompt" style="display: none;">Samimi, üretken yapay zeka modeli. Resim çizmek için "çiz: açıklama" yazınız.</textarea>
    <button id="editSystemBtn" onclick="toggleEditSystem()" title="Kişiliği düzenle" style="background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 0.45rem 0.6rem; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.65rem; cursor: pointer; white-space: nowrap;">✏️</button>
  </div>

  <div id="chat">
    <div class="empty" id="emptyState">
      <div class="icon">✦∞</div>
      <strong>OpenGemini</strong>
      <span>API key gir (aistudio.google.com)<br/>Dosya upload + sohbet + resim çiz</span>
    </div>
  </div>

  <div class="hint">Enter = gönder · Upload = ⬆️ · çiz: açıklama = resim</div>

  <div id="inputBar">
    <input type="file" id="fileInput" accept=".pdf,.txt,.jpg,.png,.jpeg,.gif,.docx,.mp4" />
    <button id="fileBtn" onclick="document.getElementById('fileInput').click()" title="Dosya upload">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </button>
    <textarea id="userInput" placeholder="Mesaj yaz... (dosya uploaded)" rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()" title="Gönder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>

<script>
  let apiKey = localStorage.getItem('gemini_key') || '';
  let history = [];
  let uploadedFile = null;
  let uploadedFileBase64 = null;
  let isEditingSystem = false;

  if (apiKey) {
    document.getElementById('apiKey').value = '••••••••••••••••••••';
  }

  function toggleEditSystem() {
    isEditingSystem = !isEditingSystem;
    const display = document.getElementById('systemPromptDisplay');
    const textarea = document.getElementById('systemPrompt');
    const btn = document.getElementById('editSystemBtn');
    
    if (isEditingSystem) {
      display.style.display = 'none';
      textarea.style.display = 'block';
      textarea.focus();
      btn.textContent = '✓';
      btn.style.background = '#4ade80';
    } else {
      textarea.style.display = 'none';
      display.textContent = textarea.value;
      display.style.display = 'block';
      btn.textContent = '✏️';
      btn.style.background = 'var(--accent)';
    }
  }

  function saveKey() {
    const val = document.getElementById('apiKey').value.trim();
    if (!val || val.startsWith('•')) return;
    apiKey = val;
    localStorage.setItem('gemini_key', apiKey);
    document.getElementById('apiKey').value = '••••••••••••••••••••';

    const setup = document.getElementById('apiSetup');
    const badge = document.createElement('span');
    badge.className = 'saved-badge';
    badge.innerHTML = '✓ Kaydedildi';
    setup.appendChild(badge);
    setTimeout(() => badge.remove(), 2000);
  }

  // File upload handler
  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const maxSize = 20 * 1024 * 1024; // 20MB
    if (file.size > maxSize) {
      alert('Dosya çok büyük! (Max 20MB)');
      return;
    }

    uploadedFile = file;
    const reader = new FileReader();
    reader.onload = (event) => {
      uploadedFileBase64 = event.target.result;
      document.getElementById('userInput').placeholder = `📎 ${file.name} yüklendi`;
    };
    reader.readAsDataURL(file);
  });

  const inputEl = document.getElementById('userInput');
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  const chatEl = document.getElementById('chat');

  function addMsg(role, content) {
    document.getElementById('emptyState')?.remove();
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = role === 'bot' ? '🎨' : '👤';
    
    let bubbleHTML = '';
    if (typeof content === 'string') {
      bubbleHTML = `<div class="bubble">${escHtml(content)}</div>`;
    } else if (content.type === 'image') {
      bubbleHTML = `<div class="bubble"><img src="${content.data}" alt="Generated" style="max-width: 280px;" /></div>`;
    } else if (content.type === 'file') {
      bubbleHTML = `<div class="bubble"><div class="file-badge">📎 ${content.name}</div></div>`;
    }
    
    div.innerHTML = `<div class="avatar">${avatar}</div>${bubbleHTML}`;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function addTyping() {
    document.getElementById('emptyState')?.remove();
    const div = document.createElement('div');
    div.id = 'typing';
    div.className = 'msg bot';
    div.innerHTML = `<div class="avatar">🎨</div><div class="bubble typing-dots"><span></span><span></span><span></span></div>`;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function escHtml(s) {
    return s
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    
    if (!text && !uploadedFile) return;
    if (!apiKey) {
      alert('⚠️ API key gir! aistudio.google.com');
      return;
    }

    // Check for draw command
    const drawMatch = text.match(/^çiz:\s*(.+)/i);
    if (drawMatch) {
      await generateImage(drawMatch[1].trim());
      return;
    }

    inputEl.value = '';
    inputEl.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('fileBtn').disabled = true;

    // Add user message
    if (text) addMsg('user', text);
    if (uploadedFile) addMsg('user', { type: 'file', name: uploadedFile.name });

    // Build message parts
    const messageParts = [];
    
    if (uploadedFile) {
      const mimeType = uploadedFile.type || 'application/octet-stream';
      const base64Data = uploadedFileBase64.split(',')[1];
      messageParts.push({
        inlineData: {
          mimeType: mimeType,
          data: base64Data
        }
      });
      messageParts.push({
        text: text || 'Bu dosyayı analiz et ve tanımla.'
      });
    } else {
      messageParts.push({ text: text });
    }

    history.push({ role: 'user', parts: messageParts });

    // Clear file after sending
    uploadedFile = null;
    uploadedFileBase64 = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('userInput').placeholder = 'Mesaj yaz...';

    addTyping();

    const systemText = document.getElementById('systemPrompt').value.trim()
      || 'Sen yardımsever bir Türkçe asistansın.';

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: systemText }] },
            contents: history,
            generationConfig: { maxOutputTokens: 2048, temperature: 0.8 }
          })
        }
      );

      const data = await res.json();
      document.getElementById('typing')?.remove();

      if (data.error) {
        addMsg('bot', '❌ Hata: ' + data.error.message);
      } else {
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '(boş)';
        history.push({ role: 'model', parts: [{ text: reply }] });
        addMsg('bot', reply);
      }
    } catch (err) {
      document.getElementById('typing')?.remove();
      addMsg('bot', '❌ Hata: ' + err.message);
    }

    document.getElementById('sendBtn').disabled = false;
    document.getElementById('fileBtn').disabled = false;
    inputEl.focus();
  }

  async function generateImage(prompt) {
    inputEl.value = '';
    inputEl.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('fileBtn').disabled = true;

    addMsg('user', `çiz: ${prompt}`);
    addTyping();

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [{
                text: `"${prompt}" için SVG resmi çiz. SADECE <svg>...</svg> kodu yaz, başka metin yazma!`
              }]
            }],
            generationConfig: { maxOutputTokens: 4096, temperature: 0.9 }
          })
        }
      );

      const data = await res.json();
      document.getElementById('typing')?.remove();

      if (data.error) {
        addMsg('bot', '❌ Hata: ' + data.error.message);
      } else {
        const svgText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        const svgMatch = svgText.match(/<svg[^>]*>[\s\S]*?<\/svg>/);
        
        if (svgMatch) {
          const svgData = 'data:image/svg+xml;base64,' + btoa(svgMatch[0]);
          addMsg('bot', { type: 'image', data: svgData });
        } else {
          addMsg('bot', '❌ SVG oluşturulamadı');
        }
      }
    } catch (err) {
      document.getElementById('typing')?.remove();
      addMsg('bot', '❌ Hata: ' + err.message);
    }
